name: Deploy Registry

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:registry
      - run: pnpm run build:storybook
      - run: rm -rf apps/registry/public/storybook && cp -R storybook-static apps/registry/public/storybook
      - run: touch apps/registry/public/.nojekyll

      - id: pages
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.request("GET /repos/{owner}/{repo}/pages", {
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              core.setOutput("enabled", "true");
            } catch (error) {
              if (error.status === 404) {
                core.warning("GitHub Pages is not enabled for this repository. Enable Pages once in repository settings to activate deployment.");
                core.setOutput("enabled", "false");
                return;
              }
              throw error;
            }

      - uses: actions/configure-pages@v5
        if: steps.pages.outputs.enabled == 'true'
        with:
          enablement: false
      - uses: actions/upload-pages-artifact@v3
        if: steps.pages.outputs.enabled == 'true'
        with:
          path: apps/registry/public
      - id: deployment
        uses: actions/deploy-pages@v4
        if: steps.pages.outputs.enabled == 'true'
